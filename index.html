#loading{position:fixed;top:0;left:0;right:0;bottom:0;background:#0F1117;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#8B90A0;font-family:'IBM Plex Sans',sans-serif;font-size:14px;z-index:9999}

<body>
<div id="loading"><div class="spinner"></div>Loading NeuroReport...</div>
<div id="root"></div>
<div id="error-display" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0F1117;color:#F87171;padding:20px;font-family:monospace;font-size:12px;overflow:auto;z-index:10000"></div>

<script>
window.onerror = function(msg, url, line, col, error) {
  var el = document.getElementById('error-display');
  el.style.display = 'block';
  el.innerHTML = '<h3 style="color:#FBBF24">NeuroReport Error</h3><p>' + msg + '</p><p>Line: ' + line + '</p><pre>' + (error ? error.stack : '') + '</pre><p style="color:#8B90A0;margin-top:20px">Take a screenshot of this and share it so we can fix it.</p>';

document.getElementById(‘loading’).style.display = ‘none’;
};
</script>

const Sel = ({ value, onChange, options, placeholder }) => (
  <select style={S.sel} value={value || ""} onChange={e => onChange(e.target.value)}>
    <option value="" disabled>{placeholder || "Select..."}</option>
    {options.map(o => {
      const isG = o.startsWith("\u2014");
      return <option key={o} value={o} disabled={isG} style={isG ? { fontWeight: 700, color: "#5B8DEF", background: "#1E2231" } : {}}>{o}</option>;
    })}
  </select>
);

const MS = ({ selected = [], onChange, options }) => (
  <div style={S.ms}>
    {options.map(o => (
      <span key={o} style={S.chip(selected.includes(o))} onClick={() => onChange(selected.includes(o) ? selected.filter(s => s !== o) : [...selected, o])}>{o}</span>
    ))}
  </div>
);

const Sec = ({ title, badge, children, defaultOpen = false }) => {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={S.sec}>
      <div style={S.secH(open)} onClick={() => setOpen(!open)}>
        <div style={S.secT}><span>{open ? "\u25BE" : "\u25B8"}</span>{title}{badge && <span style={S.badge}>{badge}</span>}</div>
      </div>
      {open && <div style={S.secB}>{children}</div>}
    </div>
  );
};

function ImgAttach({ images = [], onChange, label }) {
  const fRef = useRef();
  const [lb, setLb] = useState(null);
  const add = (files) => {
    Array.from(files).forEach(f => {
      if (!f.type.startsWith("image/")) return;
      const r = new FileReader();
      r.onload = (e) => onChange([...images, { src: e.target.result, name: f.name, caption: "" }]);
      r.readAsDataURL(f);
    });
  };
  const onPaste = (e) => {
    const items = e.clipboardData?.items; if (!items) return;
    const imgs = [];
    for (let i = 0; i < items.length; i++) if (items[i].type.startsWith("image/")) imgs.push(items[i].getAsFile());
    if (imgs.length) { e.preventDefault(); add(imgs); }
  };
  const onDrop = (e) => { e.preventDefault(); e.stopPropagation(); if (e.dataTransfer.files?.length) add(e.dataTransfer.files); };
  const rm = (idx) => onChange(images.filter((_, i) => i !== idx));
  const cap = (idx, c) => { const u = [...images]; u[idx] = { ...u[idx], caption: c }; onChange(u); };

  return (
    <div style={{ marginTop: 10 }}>
      <label style={{ ...S.lbl, fontSize: 11, color: COLORS.textMuted }}>{label || "EEG Screenshots"}</label>
      <div style={S.dz} onClick={() => fRef.current?.click()} onPaste={onPaste} onDrop={onDrop} onDragOver={e => { e.preventDefault(); e.stopPropagation(); }} tabIndex={0}>
        <input ref={fRef} type="file" accept="image/*" multiple style={{ display: "none" }} onChange={e => { add(e.target.files); e.target.value = ""; }} />
        <span style={{ fontSize: 20 }}>📷</span>
        <span style={{ fontSize: 12, color: COLORS.textSecondary }}>Click to upload, drag & drop, or <strong style={{ color: COLORS.accent }}>paste (Ctrl+V)</strong> EEG screenshots</span>
      </div>
      {images.length > 0 && (
        <div style={S.iRow}>
          {images.map((img, idx) => (
            <div key={idx} style={{ position: "relative", display: "inline-flex", flexDirection: "column", gap: 4 }}>
              <img src={img.src} alt={img.name} style={S.iThumb} onClick={() => setLb(img.src)} />
              <input style={{ ...S.inp, width: 120, fontSize: 10, padding: "3px 6px" }} placeholder="Caption..." value={img.caption} onChange={e => cap(idx, e.target.value)} onClick={e => e.stopPropagation()} />
              <button style={{ position: "absolute", top: -4, right: -4, width: 18, height: 18, borderRadius: 9, background: COLORS.error, color: "#fff", border: "none", cursor: "pointer", fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }} onClick={(e) => { e.stopPropagation(); rm(idx); }}>✕</button>
            </div>
          ))}
        </div>
      )}
      {lb && <div style={S.overlay} onClick={() => setLb(null)}><img src={lb} alt="EEG" style={{ maxWidth: "90vw", maxHeight: "90vh", borderRadius: 8 }} /></div>}
    </div>
  );
}

const defReport = () => ({
  type: "routine",
  patient: { name: "", mrn: "", dob: "", sex: "", referringPhysician: "", indication: "", relevantHistory: "" },
  technical: { duration: "", medications: [], activationProcedures: [], techComments: "" },
  background: { pdr: "", voltage: "", symmetry: "", reactivity: "", continuity: "Continuous", apReactivity: "", images: [] },
  sleep: { captured: "no", features: [] },
  activations: { hv: "Not performed", ips: "Not performed" },
  epileptiform: { present: "no", discharges: [], images: [] },
  periodic: { pattern: "None", frequency: "", modifier: "None", location: "", images: [] },
  rhythmic: { pattern: "None", location: "" },
  focalSlowing: { type: "None", location: "", images: [] },
  generalizedSlowing: { type: "None" },
  seizures: { present: "no", events: [], images: [] },
  icuDetails: { patientState: "", sedation: "", stimTesting: "", trendSummary: "" },
  impression: { classification: "", abnormalities: [], clinicalCorrelation: "", additionalComments: "" },
});
const defDis = () => ({ morphology: "", location: "", frequency: "", distribution: "" });
const defSz = () => ({ type: "", onset: "", duration: "", semiology: "", evolution: "", ending: "", eegPattern: "", eegDescription: "" });

function genNarr(r) {
  const L = [];
  const tp = r.type === "routine" ? "ROUTINE EEG REPORT" : r.type === "ltm" ? "LONG-TERM MONITORING / EMU REPORT" : "ICU CONTINUOUS EEG MONITORING REPORT";
  L.push(`[${tp}]\n`);
  if (r.patient.name || r.patient.mrn) {
    let p = `Patient: ${r.patient.name || "___"}`;
    if (r.patient.sex) p += ` | Sex: ${r.patient.sex}`;
    if (r.patient.mrn) p += ` | MRN: ${r.patient.mrn}`;
    if (r.patient.dob) p += ` | DOB: ${r.patient.dob}`;
    L.push(p);
    if (r.patient.referringPhysician) L.push(`Referring Physician: ${r.patient.referringPhysician}`);
    if (r.patient.indication) L.push(`Indication: ${r.patient.indication}`);
    L.push("");
  }
  L.push("TECHNICAL DESCRIPTION:");
  const tp2 = [];
  if (r.technical.duration) tp2.push(`Recording duration: ${r.technical.duration}.`);
  if (r.technical.activationProcedures?.length) tp2.push(`Activation procedures: ${r.technical.activationProcedures.join(", ")}.`);
  if (r.technical.medications?.length) tp2.push(`Current medications: ${r.technical.medications.join(", ")}.`);
  if (r.technical.techComments) tp2.push(r.technical.techComments);
  L.push(tp2.join(" ") || "No technical details recorded.");
  L.push("");
  if (r.type === "icu") {
    L.push("PATIENT STATE:");
    const ic = [];
    if (r.icuDetails.patientState) ic.push(`Patient state: ${r.icuDetails.patientState}.`);
    if (r.icuDetails.sedation) ic.push(`Sedation: ${r.icuDetails.sedation}.`);
    if (r.icuDetails.stimTesting) ic.push(`Stimulation testing: ${r.icuDetails.stimTesting}.`);
    L.push(ic.join(" ") || "Not documented."); L.push("");
  }
  L.push("BACKGROUND:");
  const bg = [];
  if (r.background.pdr && r.background.pdr !== "No discernible PDR") {
    const pdrClean = r.background.pdr.split(" — ")[0];
    bg.push(`The posterior dominant rhythm consists of ${pdrClean} activity`);
    if (r.background.voltage) bg.push(`, ${r.background.voltage.toLowerCase()} in amplitude`);
    if (r.background.symmetry) bg.push(`, ${r.background.symmetry.toLowerCase()}`);
    if (r.background.reactivity) bg.push(`, and ${r.background.reactivity.toLowerCase()} to eye opening`);
    bg.push(".");
  } else if (r.background.pdr === "No discernible PDR") bg.push("No discernible posterior dominant rhythm is identified.");
  if (r.background.continuity && r.background.continuity !== "Continuous") bg.push(` The background is ${r.background.continuity.toLowerCase()}.`);
  else if (r.background.continuity === "Continuous") bg.push(" The background is continuous.");
  if (r.background.apReactivity && r.background.apReactivity !== "Present and symmetric") bg.push(` Anterior-posterior gradient is ${r.background.apReactivity.toLowerCase()}.`);
  L.push(bg.join("") || "Background not described.");
  if (r.background.images?.length) L.push(`  [${r.background.images.length} EEG screenshot(s) attached]`);
  L.push("");
  if (r.sleep.captured === "yes") {
    L.push("SLEEP:"); L.push(r.sleep.features?.length ? r.sleep.features.join(". ") + "." : "Sleep was captured but no specific features documented."); L.push("");
  }
  if (r.type === "routine") {
    L.push("ACTIVATION PROCEDURES:");
    const a = [];
    a.push(r.activations.hv !== "Not performed" ? `Hyperventilation: ${r.activations.hv}.` : "Hyperventilation was not performed.");
    a.push(r.activations.ips !== "Not performed" ? `Intermittent photic stimulation: ${r.activations.ips}.` : "Intermittent photic stimulation was not performed.");
    L.push(a.join(" ")); L.push("");
  }
  L.push("EPILEPTIFORM ACTIVITY:");
  if (r.epileptiform.present === "yes" && r.epileptiform.discharges?.length) {
    r.epileptiform.discharges.forEach((d, i) => {
      const p = [];
      if (d.frequency) p.push(d.frequency.toLowerCase());
      if (d.location) p.push(d.location);
      if (d.morphology) p.push(d.morphology.toLowerCase());
      if (d.distribution) p.push(`with ${d.distribution.toLowerCase()} distribution`);
      L.push(`  ${i + 1}. ${p.join(" ") || "Unspecified discharge"}.`);
    });
  } else L.push("No epileptiform discharges are identified.");
  if (r.epileptiform.images?.length) L.push(`  [${r.epileptiform.images.length} EEG screenshot(s) attached]`);
  L.push("");
  const hasPer = r.periodic.pattern !== "None", hasRhy = r.rhythmic.pattern !== "None";
  if (hasPer || hasRhy) {
    L.push("PERIODIC & RHYTHMIC PATTERNS:");
    if (hasPer) { let pl = r.periodic.pattern; if (r.periodic.location) pl += ` at ${r.periodic.location}`; if (r.periodic.frequency) pl += `, frequency ${r.periodic.frequency}`; if (r.periodic.modifier !== "None") pl += ` ${r.periodic.modifier}`; L.push(pl + "."); }
    if (hasRhy) { let rl = r.rhythmic.pattern; if (r.rhythmic.location) rl += ` at ${r.rhythmic.location}`; L.push(rl + "."); }
    if (r.periodic.images?.length) L.push(`  [${r.periodic.images.length} EEG screenshot(s) attached]`);
    L.push("");
  }
  const hasSl = r.focalSlowing.type !== "None" || r.generalizedSlowing.type !== "None";
  if (hasSl) {
    L.push("SLOWING:");
    if (r.focalSlowing.type !== "None") L.push(`${r.focalSlowing.type}${r.focalSlowing.location ? ` over the ${r.focalSlowing.location} region` : ""}.`);
    if (r.generalizedSlowing.type !== "None") L.push(`${r.generalizedSlowing.type}.`);
    if (r.focalSlowing.images?.length) L.push(`  [${r.focalSlowing.images.length} EEG screenshot(s) attached]`);
    L.push("");
  }
  L.push("SEIZURES:");
  if (r.seizures.present === "yes" && r.seizures.events?.length) {
    r.seizures.events.forEach((s, i) => {
      const p = [];
      if (s.type && !s.type.startsWith("\u2014")) p.push(`Classification: ${s.type}`);
      if (s.onset) p.push(`Onset: ${s.onset}`);
      if (s.duration) p.push(`Duration: ${s.duration}`);
      if (s.eegPattern) p.push(`EEG pattern: ${s.eegPattern}`);
      if (s.evolution && s.evolution !== "Not applicable") p.push(`Evolution: ${s.evolution}`);
      if (s.ending) p.push(`Ending: ${s.ending}`);
      if (s.semiology && s.semiology !== "No clinical correlate (subclinical)") p.push(`Semiology: ${s.semiology}`);
      if (s.eegDescription) p.push(`Description: ${s.eegDescription}`);
      L.push(`  Event ${i + 1}: ${p.join(" | ")}`);
    });
  } else L.push("No electrographic seizures are captured during this recording.");
  if (r.seizures.images?.length) L.push(`  [${r.seizures.images.length} EEG screenshot(s) attached]`);
  L.push("");
  if (r.type === "icu" && r.icuDetails.trendSummary) { L.push("TREND SUMMARY:"); L.push(r.icuDetails.trendSummary); L.push(""); }
  L.push("IMPRESSION:");
  if (r.impression.classification) L.push(`This is ${r.impression.classification === "Abnormal" ? "an ABNORMAL" : "a NORMAL"} ${r.type === "routine" ? "EEG" : r.type === "ltm" ? "long-term EEG monitoring study" : "continuous EEG monitoring study"}.`);
  if (r.impression.abnormalities?.length) L.push(`Abnormalities include: ${r.impression.abnormalities.join(", ")}.`);
  L.push(""); L.push("CLINICAL CORRELATION:"); L.push(r.impression.clinicalCorrelation || "___");
  if (r.impression.additionalComments) { L.push(""); L.push("ADDITIONAL COMMENTS:"); L.push(r.impression.additionalComments); }
  return L.join("\n");
}

function Preview({ report }) {
  const n = genNarr(report);
  const secs = n.split("\n\n");
  const allImgs = [
    ...(report.background.images || []).map(i => ({ ...i, section: "Background" })),

      {allImgs.length > 0 && (

              <div style={{ fontSize: 11, color: "#666", marginTop: 4 }}><em>{img.section}{img.caption ? ` \u2014 ${img.caption}` : ""}</em></div>
            </div>
          ))}
        </div>
      )}
      <div style={{ marginTop: 40, borderTop: "1px solid #ddd", paddingTop: 16, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, fontSize: 12, color: "#888" }}>

        <div><div style={{ fontWeight: 600, color: "#555", marginBottom: 4 }}>Technologist</div><div style={{ borderBottom: "1px solid #ccc", paddingBottom: 24, marginBottom: 4 }}></div><div>Signature / Date</div></div>
      </div>
    </div>
  );
}

            {["yes", "no"].map(v => (<label key={v} style={S.cb}><input type="radio" name="epi" checked={rpt.epileptiform.present === v} onChange={() => { u("epileptiform.present", v); if (v === "yes" && !rpt.epileptiform.discharges.length) addDis(); }} /> {v === "yes" ? "Yes" : "No"}</label>))}
          </div>
        </Field>
        {rpt.epileptiform.present === "yes" && (<>
          {rpt.epileptiform.discharges.map((d, i) => (
            <div key={i} style={S.eCard}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.accent }}>Discharge #{i + 1}</span>
                <button style={S.rmB} onClick={() => rmDis(i)}>✕ Remove</button>
              </div>
              <div style={S.r2}>
                <Field label="Morphology"><Sel value={d.morphology} onChange={v => upDis(i, "morphology", v)} options={ACNS_TERMINOLOGY.epileptiformMorphology} /></Field>
                <Field label="Location"><Sel value={d.location} onChange={v => upDis(i, "location", v)} options={ACNS_TERMINOLOGY.epileptiformLocation} /></Field>
              </div>
              <div style={S.r2}>
                <Field label="Frequency"><Sel value={d.frequency} onChange={v => upDis(i, "frequency", v)} options={ACNS_TERMINOLOGY.epileptiformFrequency} /></Field>
                <Field label="Distribution"><Sel value={d.distribution} onChange={v => upDis(i, "distribution", v)} options={ACNS_TERMINOLOGY.epileptiformDistribution} /></Field>
              </div>
            </div>
          ))}
          <button style={S.addB} onClick={addDis}>+ Add Discharge</button>
        </>)}
        <ImgAttach label="Epileptiform Activity EEG Screenshots" images={rpt.epileptiform.images} onChange={v => u("epileptiform.images", v)} />
      </Sec>

      <Sec title="Periodic & Rhythmic Patterns" badge="ACNS">
        <div style={S.r2}>
          <Field label="Periodic Pattern"><Sel value={rpt.periodic.pattern} onChange={v => u("periodic.pattern", v)} options={ACNS_TERMINOLOGY.periodicPattern} /></Field>
          {rpt.periodic.pattern !== "None" && <Field label="Frequency"><Sel value={rpt.periodic.frequency} onChange={v => u("periodic.frequency", v)} options={ACNS_TERMINOLOGY.periodicFrequency} /></Field>}
        </div>
        {rpt.periodic.pattern !== "None" && (
          <div style={S.r2}>
            <Field label="Modifier"><Sel value={rpt.periodic.modifier} onChange={v => u("periodic.modifier", v)} options={ACNS_TERMINOLOGY.periodicModifier} /></Field>
            <Field label="Location"><Sel value={rpt.periodic.location} onChange={v => u("periodic.location", v)} options={ACNS_TERMINOLOGY.epileptiformLocation} /></Field>
          </div>
        )}
        <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${COLORS.border}` }}>
          <div style={S.r2}>
            <Field label="Rhythmic Pattern"><Sel value={rpt.rhythmic.pattern} onChange={v => u("rhythmic.pattern", v)} options={ACNS_TERMINOLOGY.rhythmicPattern} /></Field>
            {rpt.rhythmic.pattern !== "None" && <Field label="Location"><Sel value={rpt.rhythmic.location} onChange={v => u("rhythmic.location", v)} options={ACNS_TERMINOLOGY.slowingLocation} /></Field>}
          </div>
        </div>
        <ImgAttach label="Periodic/Rhythmic Pattern EEG Screenshots" images={rpt.periodic.images} onChange={v => u("periodic.images", v)} />
      </Sec>

      <Sec title="Slowing">
        <div style={S.r2}>
          <Field label="Focal Slowing"><Sel value={rpt.focalSlowing.type} onChange={v => u("focalSlowing.type", v)} options={ACNS_TERMINOLOGY.focalSlowing} /></Field>
          {rpt.focalSlowing.type !== "None" && <Field label="Location"><Sel value={rpt.focalSlowing.location} onChange={v => u("focalSlowing.location", v)} options={ACNS_TERMINOLOGY.slowingLocation} /></Field>}
        </div>
        <Field label="Generalized Slowing"><Sel value={rpt.generalizedSlowing.type} onChange={v => u("generalizedSlowing.type", v)} options={ACNS_TERMINOLOGY.generalizedSlowing} /></Field>
        <ImgAttach label="Slowing EEG Screenshots" images={rpt.focalSlowing.images} onChange={v => u("focalSlowing.images", v)} />
      </Sec>

      <Sec title="Seizures / Events" badge="ILAE 2017">
        <Field label="Seizures Captured">
          <div style={{ display: "flex", gap: 12 }}>
            {["yes", "no"].map(v => (<label key={v} style={S.cb}><input type="radio" name="sz" checked={rpt.seizures.present === v} onChange={() => { u("seizures.present", v); if (v === "yes" && !rpt.seizures.events.length) addSz(); }} /> {v === "yes" ? "Yes" : "No"}</label>))}
          </div>
        </Field>
        {rpt.seizures.present === "yes" && (<>
          {rpt.seizures.events.map((s, i) => (
            <div key={i} style={S.eCard}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.warning }}>Event #{i + 1}</span>
                <button style={S.rmB} onClick={() => rmSz(i)}>✕ Remove</button>
              </div>
              <div style={S.r2}>
                <Field label="Seizure Classification (ILAE 2017)"><Sel value={s.type} onChange={v => upSz(i, "type", v)} options={ACNS_TERMINOLOGY.seizureType} placeholder="Select classification..." /></Field>
                <Field label="EEG Onset Location"><Sel value={s.onset} onChange={v => upSz(i, "onset", v)} options={ACNS_TERMINOLOGY.seizureOnset} /></Field>
              </div>
              <div style={S.r3}>
                <Field label="Duration"><Sel value={s.duration} onChange={v => upSz(i, "duration", v)} options={ACNS_TERMINOLOGY.seizureDuration} /></Field>
                <Field label="EEG Pattern"><Sel value={s.eegPattern} onChange={v => upSz(i, "eegPattern", v)} options={ACNS_TERMINOLOGY.seizureEEGPattern} /></Field>
                <Field label="Evolution"><Sel value={s.evolution} onChange={v => upSz(i, "evolution", v)} options={ACNS_TERMINOLOGY.seizureEvolution} /></Field>
              </div>
              <div style={S.r2}>
                <Field label="Seizure Ending"><Sel value={s.ending} onChange={v => upSz(i, "ending", v)} options={ACNS_TERMINOLOGY.seizureEnd} /></Field>
                <Field label="Semiology"><Sel value={s.semiology} onChange={v => upSz(i, "semiology", v)} options={ACNS_TERMINOLOGY.seizureSemiology} /></Field>
              </div>
              <Field label="EEG Description (free text)"><textarea style={S.ta} value={s.eegDescription} onChange={e => upSz(i, "eegDescription", e.target.value)} placeholder="Describe the ictal EEG pattern, evolution, and post-ictal features..." /></Field>
            </div>
          ))}
          <button style={S.addB} onClick={addSz}>+ Add Seizure Event</button>
        </>)}
        <ImgAttach label="Seizure / Event EEG Screenshots" images={rpt.seizures.images} onChange={v => u("seizures.images", v)} />
      </Sec>

      <Sec title="Impression & Clinical Correlation" defaultOpen>
        <Field label="Overall Classification">
          <div style={{ display: "flex", gap: 12 }}>
            {["Normal", "Abnormal"].map(v => (<label key={v} style={S.cb}><input type="radio" name="imp" checked={rpt.impression.classification === v} onChange={() => u("impression.classification", v)} /> {v}</label>))}
          </div>
        </Field>
        {rpt.impression.classification === "Abnormal" && <Field label="Abnormalities"><MS selected={rpt.impression.abnormalities} onChange={v => u("impression.abnormalities", v)} options={ACNS_TERMINOLOGY.abnormalityType} /></Field>}
        <Field label="Clinical Correlation"><textarea style={{ ...S.ta, minHeight: 80 }} value={rpt.impression.clinicalCorrelation} onChange={e => u("impression.clinicalCorrelation", e.target.value)} placeholder="Provide clinical correlation and interpretation..." /></Field>
        <Field label="Additional Comments"><textarea style={S.ta} value={rpt.impression.additionalComments} onChange={e => u("impression.additionalComments", e.target.value)} placeholder="Optional additional comments..." /></Field>
      </Sec>
    </div>)}

    {view === "narrative" && (<div>
      <div style={{ marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 13, color: COLORS.textSecondary }}>Auto-generated from structured data using ACNS standardized terminology</span>
        <button style={S.bs} onClick={() => navigator.clipboard.writeText(genNarr(rpt))}>📋 Copy Text</button>
      </div>
      <div style={S.narr}>{genNarr(rpt)}</div>
    </div>)}

    {view === "preview" && (<div>
      <div style={{ marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 13, color: COLORS.textSecondary }}>Formatted report preview — use Print / PDF button to export</span>
        <button style={S.bp} onClick={doPrint}>🖨 Print / Export PDF</button>
      </div>
      <Preview report={rpt} />
    </div>)}
  </div>
</div>
