const C = {bg:”#0F1117”,srf:”#181B25”,sAlt:”#1E2231”,brd:”#2A2F3F”,acc:”#5B8DEF”,aDim:“rgba(91,141,239,0.12)”,txt:”#E8EAF0”,tSec:”#8B90A0”,tMut:”#5A5F72”,ok:”#4ADE80”,warn:”#FBBF24”,err:”#F87171”,sBg:”#141720”};

function Fld({label, children}) {
return html`<div style=${{marginBottom:14}}><label style=${{display:"block",fontSize:12,fontWeight:500,color:C.tSec,marginBottom:5}}>${label}</label>${children}</div>`;
}

function Sel({value, onChange, options, placeholder}) {
return html`<select style=${{width:"100%",padding:"8px 12px",borderRadius:8,border:"1px solid "+C.brd,background:C.sAlt,color:C.txt,fontSize:13,outline:"none"}} value=${value||""} onChange=${e=>onChange(e.target.value)}> <option value="" disabled>${placeholder||"Select..."}</option> ${options.map(o => { const isG = o.startsWith("\u2014"); return html`<option key=${o} value=${o} disabled=${isG} style=${isG?{fontWeight:700,color:C.acc}:{}}>${o}</option>`; })} </select>`;
}

function MSelect({selected=[], onChange, options}) {
return html`<div style=${{display:"flex",flexWrap:"wrap",gap:6}}> ${options.map(o => html`<span key=${o} style=${{padding:“5px 12px”,borderRadius:16,border:“1px solid “+(selected.includes(o)?C.acc:C.brd),cursor:“pointer”,fontSize:12,fontWeight:selected.includes(o)?600:400,background:selected.includes(o)?C.aDim:“transparent”,color:selected.includes(o)?C.acc:C.tSec,whiteSpace:“nowrap”}} onClick=${()=>onChange(selected.includes(o)?selected.filter(s=>s!==o):[…selected,o])}>${o}</span>`)}

  </div>`;
}

function Sec({title, badge, children, defaultOpen=false}) {
const [open, setOpen] = useState(defaultOpen);
return html`<div style=${{background:C.srf,borderRadius:12,border:"1px solid "+C.brd,marginBottom:16,overflow:"hidden"}}> <div style=${{padding:"14px 20px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",background:open?C.sBg:"transparent",userSelect:"none"}} onClick=${()=>setOpen(!open)}> <div style=${{fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:8}}> <span>${open?"\u25BE":"\u25B8"}</span>${title}${badge&&html`<span style=${{fontSize:10,padding:“2px 8px”,borderRadius:10,background:C.aDim,color:C.acc,fontWeight:600}}>${badge}</span>`} </div> </div> ${open && html`<div style=${{padding:“16px 20px”,borderTop:“1px solid “+C.brd}}>${children}</div>`}

  </div>`;
}

function ImgAttach({images=[], onChange, label}) {
const fRef = useRef();
const [lb, setLb] = useState(null);
const add = (files) => {
Array.from(files).forEach(f => {
if (!f.type.startsWith(“image/”)) return;
const r = new FileReader();
r.onload = (e) => onChange([…images, {src:e.target.result, name:f.name, caption:””}]);
r.readAsDataURL(f);
});
};
return html`<div style=${{marginTop:10}}> <label style=${{display:"block",fontSize:11,fontWeight:500,color:C.tMut,marginBottom:5}}>${label||"EEG Screenshots"}</label> <div style=${{border:"2px dashed #3A3F52",borderRadius:10,padding:"12px 16px",display:"flex",flexDirection:"column",alignItems:"center",gap:8,cursor:"pointer",background:"rgba(91,141,239,0.04)",minHeight:60,justifyContent:"center"}} onClick=${()=>fRef.current?.click()} onDrop=${e=>{e.preventDefault();if(e.dataTransfer.files?.length)add(e.dataTransfer.files)}} onDragOver=${e=>{e.preventDefault()}} onPaste=${e=>{const items=e.clipboardData?.items;if(!items)return;const imgs=[];for(let i=0;i<items.length;i++)if(items[i].type.startsWith("image/"))imgs.push(items[i].getAsFile());if(imgs.length){e.preventDefault();add(imgs)}}} tabIndex=${0}> <input ref=${fRef} type="file" accept="image/*" multiple style=${{display:"none"}} onChange=${e=>{add(e.target.files);e.target.value=""}} /> <span style=${{fontSize:20}}>\uD83D\uDCF7</span> <span style=${{fontSize:12,color:C.tSec}}>Click to upload, drag & drop, or <strong style=${{color:C.acc}}>paste (Ctrl+V)</strong></span> </div> ${images.length>0 && html`<div style=${{display:“flex”,flexWrap:“wrap”,gap:8,marginTop:8}}>
${images.map((img,idx)=>html`<div key=${idx} style=${{position:"relative",display:"inline-flex",flexDirection:"column",gap:4}}> <img src=${img.src} style=${{width:120,height:90,objectFit:"cover",borderRadius:6,border:"1px solid "+C.brd,cursor:"pointer"}} onClick=${()=>setLb(img.src)} /> <input style=${{width:120,fontSize:10,padding:"3px 6px",borderRadius:6,border:"1px solid "+C.brd,background:C.sAlt,color:C.txt,outline:"none"}} placeholder="Caption..." value=${img.caption} onChange=${e=>{const u=[...images];u[idx]={...u[idx],caption:e.target.value};onChange(u)}} /> <button style=${{position:"absolute",top:-4,right:-4,width:18,height:18,borderRadius:9,background:C.err,color:"#fff",border:"none",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}} onClick=${()=>onChange(images.filter((_,i)=>i!==idx))}>\u2715</button> </div>`)}
</div>`} ${lb && html`<div style=${{position:“fixed”,top:0,left:0,right:0,bottom:0,background:“rgba(0,0,0,0.85)”,display:“flex”,alignItems:“center”,justifyContent:“center”,zIndex:9999,cursor:“zoom-out”}} onClick=${()=>setLb(null)}><img src=${lb} style=${{maxWidth:“90vw”,maxHeight:“90vh”,borderRadius:8}} /></div>`}

  </div>`;
}

const defReport = () => ({
type:“routine”,
patient:{name:””,mrn:””,dob:””,sex:””,referringPhysician:””,indication:””,relevantHistory:””},
technical:{duration:””,medications:[],activationProcedures:[],techComments:””},
background:{pdr:””,voltage:””,symmetry:””,reactivity:””,continuity:“Continuous”,apReactivity:””,images:[]},
sleep:{captured:“no”,features:[]},
activations:{hv:“Not performed”,ips:“Not performed”},
epileptiform:{present:“no”,discharges:[],images:[]},
periodic:{pattern:“None”,frequency:””,modifier:“None”,location:””,images:[]},
rhythmic:{pattern:“None”,location:””},
focalSlowing:{type:“None”,location:””,images:[]},
generalizedSlowing:{type:“None”},
seizures:{present:“no”,events:[],images:[]},
icuDetails:{patientState:””,sedation:””,stimTesting:””,trendSummary:””},
impression:{classification:””,abnormalities:[],clinicalCorrelation:””,additionalComments:””},
});

function genNarr(r) {
const L = [];
const tp = r.type===“routine”?“ROUTINE EEG REPORT”:r.type===“ltm”?“LONG-TERM MONITORING / EMU REPORT”:“ICU CONTINUOUS EEG MONITORING REPORT”;
L.push(”[”+tp+”]\n”);
if (r.patient.name||r.patient.mrn) {
let p = “Patient: “+(r.patient.name||”***”);
if(r.patient.sex)p+=” | Sex: “+r.patient.sex;
if(r.patient.mrn)p+=” | MRN: “+r.patient.mrn;
if(r.patient.dob)p+=” | DOB: “+r.patient.dob;
L.push(p);
if(r.patient.referringPhysician)L.push(“Referring Physician: “+r.patient.referringPhysician);
if(r.patient.indication)L.push(“Indication: “+r.patient.indication);
L.push(””);
}
L.push(“TECHNICAL DESCRIPTION:”);
const t2=[];
if(r.technical.duration)t2.push(“Recording duration: “+r.technical.duration+”.”);
if(r.technical.activationProcedures?.length)t2.push(“Activation procedures: “+r.technical.activationProcedures.join(”, “)+”.”);
if(r.technical.medications?.length)t2.push(“Current medications: “+r.technical.medications.join(”, “)+”.”);
if(r.technical.techComments)t2.push(r.technical.techComments);
L.push(t2.join(” “)||“No technical details recorded.”);L.push(””);
if(r.type===“icu”){L.push(“PATIENT STATE:”);const ic=[];if(r.icuDetails.patientState)ic.push(“Patient state: “+r.icuDetails.patientState+”.”);if(r.icuDetails.sedation)ic.push(“Sedation: “+r.icuDetails.sedation+”.”);if(r.icuDetails.stimTesting)ic.push(“Stimulation testing: “+r.icuDetails.stimTesting+”.”);L.push(ic.join(” “)||“Not documented.”);L.push(””);}
L.push(“BACKGROUND:”);
const bg=[];
if(r.background.pdr&&r.background.pdr!==“No discernible PDR”){const pc=r.background.pdr.split(” \u2014 “)[0];bg.push(“The posterior dominant rhythm consists of “+pc+” activity”);if(r.background.voltage)bg.push(”, “+r.background.voltage.toLowerCase()+” in amplitude”);if(r.background.symmetry)bg.push(”, “+r.background.symmetry.toLowerCase());if(r.background.reactivity)bg.push(”, and “+r.background.reactivity.toLowerCase()+” to eye opening”);bg.push(”.”);}else if(r.background.pdr===“No discernible PDR”)bg.push(“No discernible posterior dominant rhythm is identified.”);
if(r.background.continuity&&r.background.continuity!==“Continuous”)bg.push(” The background is “+r.background.continuity.toLowerCase()+”.”);else if(r.background.continuity===“Continuous”)bg.push(” The background is continuous.”);
if(r.background.apReactivity&&r.background.apReactivity!==“Present and symmetric”)bg.push(” Anterior-posterior gradient is “+r.background.apReactivity.toLowerCase()+”.”);
L.push(bg.join(””)||“Background not described.”);if(r.background.images?.length)L.push(”  [”+r.background.images.length+” EEG screenshot(s) attached]”);L.push(””);
if(r.sleep.captured===“yes”){L.push(“SLEEP:”);L.push(r.sleep.features?.length?r.sleep.features.join(”. “)+”.”:“Sleep captured, no features documented.”);L.push(””);}
if(r.type===“routine”){L.push(“ACTIVATION PROCEDURES:”);const a=[];a.push(r.activations.hv!==“Not performed”?“Hyperventilation: “+r.activations.hv+”.”:“Hyperventilation was not performed.”);a.push(r.activations.ips!==“Not performed”?“Intermittent photic stimulation: “+r.activations.ips+”.”:“Intermittent photic stimulation was not performed.”);L.push(a.join(” “));L.push(””);}
L.push(“EPILEPTIFORM ACTIVITY:”);
if(r.epileptiform.present===“yes”&&r.epileptiform.discharges?.length){r.epileptiform.discharges.forEach((d,i)=>{const p=[];if(d.frequency)p.push(d.frequency.toLowerCase());if(d.location)p.push(d.location);if(d.morphology)p.push(d.morphology.toLowerCase());if(d.distribution)p.push(“with “+d.distribution.toLowerCase()+” distribution”);L.push(”  “+(i+1)+”. “+(p.join(” “)||“Unspecified discharge”)+”.”);});}else L.push(“No epileptiform discharges are identified.”);
if(r.epileptiform.images?.length)L.push(”  [”+r.epileptiform.images.length+” EEG screenshot(s) attached]”);L.push(””);
if(r.periodic.pattern!==“None”||r.rhythmic.pattern!==“None”){L.push(“PERIODIC & RHYTHMIC PATTERNS:”);if(r.periodic.pattern!==“None”){let pl=r.periodic.pattern;if(r.periodic.location)pl+=” at “+r.periodic.location;if(r.periodic.frequency)pl+=”, frequency “+r.periodic.frequency;if(r.periodic.modifier!==“None”)pl+=” “+r.periodic.modifier;L.push(pl+”.”);}if(r.rhythmic.pattern!==“None”){let rl=r.rhythmic.pattern;if(r.rhythmic.location)rl+=” at “+r.rhythmic.location;L.push(rl+”.”);}if(r.periodic.images?.length)L.push(”  [”+r.periodic.images.length+” EEG screenshot(s) attached]”);L.push(””);}
if(r.focalSlowing.type!==“None”||r.generalizedSlowing.type!==“None”){L.push(“SLOWING:”);if(r.focalSlowing.type!==“None”)L.push(r.focalSlowing.type+(r.focalSlowing.location?” over the “+r.focalSlowing.location+” region”:””)+”.”);if(r.generalizedSlowing.type!==“None”)L.push(r.generalizedSlowing.type+”.”);if(r.focalSlowing.images?.length)L.push(”  [”+r.focalSlowing.images.length+” EEG screenshot(s) attached]”);L.push(””);}
L.push(“SEIZURES:”);
if(r.seizures.present===“yes”&&r.seizures.events?.length){r.seizures.events.forEach((s,i)=>{const p=[];if(s.type&&!s.type.startsWith(”\u2014”))p.push(“Classification: “+s.type);if(s.onset)p.push(“Onset: “+s.onset);if(s.duration)p.push(“Duration: “+s.duration);if(s.eegPattern)p.push(“EEG pattern: “+s.eegPattern);if(s.evolution&&s.evolution!==“Not applicable”)p.push(“Evolution: “+s.evolution);if(s.ending)p.push(“Ending: “+s.ending);if(s.semiology&&s.semiology!==“No clinical correlate (subclinical)”)p.push(“Semiology: “+s.semiology);if(s.eegDescription)p.push(“Description: “+s.eegDescription);L.push(”  Event “+(i+1)+”: “+p.join(” | “));});}else L.push(“No electrographic seizures are captured during this recording.”);
if(r.seizures.images?.length)L.push(”  [”+r.seizures.images.length+” EEG screenshot(s) attached]”);L.push(””);
if(r.type===“icu”&&r.icuDetails.trendSummary){L.push(“TREND SUMMARY:”);L.push(r.icuDetails.trendSummary);L.push(””);}
L.push(“IMPRESSION:”);
if(r.impression.classification)L.push(“This is “+(r.impression.classification===“Abnormal”?“an ABNORMAL”:“a NORMAL”)+” “+(r.type===“routine”?“EEG”:r.type===“ltm”?“long-term EEG monitoring study”:“continuous EEG monitoring study”)+”.”);
if(r.impression.abnormalities?.length)L.push(“Abnormalities include: “+r.impression.abnormalities.join(”, “)+”.”);
L.push(””);L.push(“CLINICAL CORRELATION:”);L.push(r.impression.clinicalCorrelation||”***”);
if(r.impression.additionalComments){L.push(””);L.push(“ADDITIONAL COMMENTS:”);L.push(r.impression.additionalComments);}
return L.join(”\n”);
}
